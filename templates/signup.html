{% extends 'base.html' %}
{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon">🍽️</div>
            <h2>Create Account</h2>
            <p>Join FoodieExpress today</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Username
                </label>
                <input type="text" id="username" name="username" 
                       placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input type="email" id="email" name="email" 
                       placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" id="password" name="password" 
                       placeholder="Choose a password" required minlength="6">
                <small>Minimum 6 characters</small>
            </div>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" required> I agree to the 
                    <a href="#">Terms of Service</a> and 
                    <a href="#">Privacy Policy</a>
                </label>
            </div>
            
            <button type="submit" class="btn btn-success btn-block">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>
        
        <div class="password-requirements">
            <p><i class="fas fa-shield-alt"></i> Password must contain:</p>
            <ul>
                <li><i class="fas fa-check-circle"></i> At least 6 characters</li>
                <li><i class="fas fa-check-circle"></i> Letters and numbers</li>
                <li><i class="fas fa-check-circle"></i> No spaces</li>
            </ul>
        </div>
    </div>
</div>

<style>
    .auth-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    
    .auth-card {
        background: white;
        border-radius: 30px;
        padding: 50px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .logo-icon {
        font-size: 60px;
        margin-bottom: 20px;
        animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    
    .auth-header h2 {
        margin: 0 0 10px 0;
        color: #333;
        font-size: 28px;
    }
    
    .auth-header p {
        margin: 0;
        color: #666;
        font-size: 16px;
    }
    
    .auth-form {
        margin-bottom: 30px;
    }
    
    .form-group {
        margin-bottom: 25px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
    }
    
    .form-group label i {
        color: #667eea;
        margin-right: 5px;
    }
    
    .form-group input {
        width: 100%;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    
    .form-group small {
        display: block;
        margin-top: 5px;
        color: #999;
        font-size: 12px;
    }
    
    .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #666;
        font-weight: normal;
        cursor: pointer;
        flex-wrap: wrap;
    }
    
    .checkbox-label input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
    }
    
    .checkbox-label a {
        color: #667eea;
        text-decoration: none;
    }
    
    .checkbox-label a:hover {
        text-decoration: underline;
    }
    
    .btn-block {
        width: 100%;
        padding: 15px !important;
        font-size: 18px !important;
        margin-top: 10px;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 20px;
    }
    
    .auth-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }
    
    .auth-footer a:hover {
        color: #764ba2;
        text-decoration: underline;
    }
    
    .password-requirements {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 12px;
        margin-top: 20px;
    }
    
    .password-requirements p {
        margin: 0 0 10px 0;
        color: #333;
        font-weight: 600;
    }
    
    .password-requirements p i {
        color: #667eea;
        margin-right: 5px;
    }
    
    .password-requirements ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    
    .password-requirements li {
        margin: 8px 0;
        color: #666;
        font-size: 13px;
    }
    
    .password-requirements li i {
        color: #28a745;
        margin-right: 8px;
        font-size: 14px;
    }
    
    @media (max-width: 768px) {
        .auth-card {
            padding: 30px;
        }
        
        .auth-header h2 {
            font-size: 24px;
        }
        
        .logo-icon {
            font-size: 50px;
        }
        
        .checkbox-label {
            font-size: 13px;
        }
    }
</style>

{% endblock %}
