{% extends 'base.html' %}
{% block content %}

<h2><i class="fas fa-credit-card"></i> Select Payment Method</h2>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px;">
    <!-- Cash on Delivery Card -->
    <div class="card" style="text-align: center; padding: 30px;">
        <i class="fas fa-money-bill-wave" style="font-size: 4rem; color: #28a745; margin-bottom: 20px;"></i>
        <h3>Cash</h3>
        <p style="color: #666; margin: 15px 0;">Pay when you receive your order</p>
        <form method="POST" action="/place_order">
            <input type="hidden" name="payment_method" value="Cash">
            <button type="submit" class="btn btn-success" style="width: 100%; padding: 12px;">
                <i class="fas fa-money-bill-wave"></i> Select Cash
            </button>
        </form>
    </div>

    <!-- Online Payment Card -->
    <div class="card" style="text-align: center; padding: 30px;">
        <i class="fas fa-credit-card" style="font-size: 4rem; color: #007bff; margin-bottom: 20px;"></i>
        <h3>Online Payment</h3>
        <p style="color: #666; margin: 15px 0;">Pay securely with card, UPI, or netbanking</p>
        <form method="POST" action="/place_order">
            <input type="hidden" name="payment_method" value="Online">
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
                <i class="fas fa-credit-card"></i> Pay Online
            </button>
        </form>
    </div>
</div>

<div style="text-align: center; margin-top: 20px;">
    <a href="/cart" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Cart
    </a>
</div>

<style>
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
    }
</style>

{% endblock %}
