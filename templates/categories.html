{% extends 'base.html' %}
{% block content %}

<h2><i class="fas fa-tags"></i> Manage Categories</h2>

<div class="form-card">
    <h3>Add New Category</h3>
    <form method="POST">
        <label>Category Name</label>
        <input type="text" name="category" placeholder="Enter category name" required>
        <button type="submit" class="btn-success">
            <i class="fas fa-plus"></i> Add Category
        </button>
    </form>
</div>

<h3>Category List</h3>

<table>
    <thead>
        <tr>

            <th>Category Name</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for c in categories %}
        <tr>

            <td>{{ c[1] }}</td>
            <td>
                <a href="/category/edit/{{ c[0] }}" class="btn btn-warning">
                    <i class="fas fa-edit"></i> Edit
                </a>
                <a href="/category/delete/{{ c[0] }}" class="btn btn-danger"
                   onclick="return confirm('Delete this category?')">
                   <i class="fas fa-trash"></i> Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
