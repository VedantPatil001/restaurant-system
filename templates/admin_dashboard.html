{% extends 'base.html' %}
{% block content %}

<h2><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h2>

<div class="dashboard-grid">
    <div class="dashboard-card">
        <h3>Total Orders</h3>
        <div class="number">{{ total_orders }}</div>
    </div>
    <div class="dashboard-card">
        <h3>Total Sales</h3>
        <div class="number">₹{{ total_sales }}</div>
    </div>
    <div class="dashboard-card">
        <h3>Pending Orders</h3>
        <div class="number">{{ pending_orders }}</div>
    </div>
</div>

<div class="card">
    <h3>Quick Actions</h3>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
        <a href="/admin/orders" class="btn btn-primary" style="text-align: center;">
            <i class="fas fa-list"></i> Manage Orders
        </a>
        <a href="/menu" class="btn btn-primary" style="text-align: center;">
            <i class="fas fa-utensils"></i> Manage Menu
        </a>
        <a href="/categories" class="btn btn-primary" style="text-align: center;">
            <i class="fas fa-tags"></i> Categories
        </a>
        <a href="/quantities" class="btn btn-primary" style="text-align: center;">
            <i class="fas fa-balance-scale"></i> Sizes
        </a>
    </div>
</div>

{% endblock %}
