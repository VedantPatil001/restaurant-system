{% extends 'base.html' %}
{% block content %}

<div class="clearfix">
    <h2 style="float: left;"><i class="fas fa-utensils"></i> Menu Items</h2>
    <a href="/menu/add" class="btn btn-success" style="float: right;">
        <i class="fas fa-plus"></i> Add New Item
    </a>
</div>

<table>
    <thead>
        <tr>

            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Size</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for m in menus %}
        <tr>

            <td>{{ m[1] }}</td>
            <td>₹{{ m[2] }}</td>
            <td>{{ m[3] }}</td>
            <td>{{ m[4] }}</td>
            <td>
                <a href="/menu/edit/{{ m[0] }}" class="btn btn-warning">
                    <i class="fas fa-edit"></i> Edit
                </a>
                <a href="/menu/delete/{{ m[0] }}" class="btn btn-danger"
                   onclick="return confirm('Delete this item?')">
                    <i class="fas fa-trash"></i> Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% if not menus %}
<div class="card text-center" style="padding: 3rem;">
    <i class="fas fa-utensils" style="font-size: 4rem; color: #ccc; margin-bottom: 1rem;"></i>
    <h3>No menu items found</h3>
    <a href="/menu/add" class="btn btn-success mt-20">
        <i class="fas fa-plus"></i> Add First Item
    </a>
</div>
{% endif %}

{% endblock %}
