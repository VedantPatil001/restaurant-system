{% extends 'base.html' %}
{% block content %}

<div class="card" style="max-width: 500px; margin: 50px auto; text-align: center; padding: 40px;">
    <i class="fas fa-check-circle" style="font-size: 5rem; color: #28a745; margin-bottom: 20px;"></i>
    
    <h2>Order Placed Successfully!</h2>
    
    <p style="font-size: 1.2rem; margin: 20px 0;">
        Order #{{ order_id }}
    </p>
    
    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin: 20px 0;">
        <i class="fas fa-money-bill-wave" style="font-size: 2rem; color: #28a745;"></i>
        <h3>Cash on Delivery</h3>
        <p style="color: #666;">Amount to pay: <strong>₹{{ total }}</strong></p>
        <p style="color: #666;">Please keep exact change ready</p>
    </div>
    
    <p style="color: #666; margin: 20px 0;">
        Your order will be delivered within 45 minutes.
    </p>
    
    <div style="display: flex; gap: 10px; justify-content: center;">
        <a href="/my_orders" class="btn btn-primary">
            <i class="fas fa-list"></i> View Orders
        </a>
        <a href="/" class="btn btn-success">
            <i class="fas fa-utensils"></i> Order More
        </a>
    </div>
</div>

{% endblock %}
