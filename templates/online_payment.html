{% extends 'base.html' %}
{% block content %}

<h2><i class="fas fa-credit-card"></i> Complete Your Payment</h2>

<div class="card" style="max-width: 500px; margin: 30px auto; padding: 30px;">
    <div style="text-align: center; margin-bottom: 30px;">
        <i class="fas fa-lock" style="font-size: 3rem; color: #28a745;"></i>
        <h3>Secure Payment</h3>
        <p style="color: #666;">Order #{{ order_id }}</p>
    </div>

    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>Subtotal:</span>
            <span><strong>₹{{ total }}</strong></span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>Taxes & Fees:</span>
            <span><strong>₹0</strong></span>
        </div>
        <hr>
        <div style="display: flex; justify-content: space-between; font-size: 1.2rem;">
            <span>Total Amount:</span>
            <span><strong style="color: #28a745;">₹{{ total }}</strong></span>
        </div>
    </div>
    
    <!-- UPI ID Input with better validation [citation:7] -->
    <div class="form-group" style="margin-bottom: 20px;">
        <label for="upi_id"><i class="fas fa-qrcode"></i> Your UPI ID</label>
        <input type="text" id="upi_id" name="upi_id" class="form-control" 
               placeholder="e.g., username@okhdfcbank" 
               pattern="[a-zA-Z0-9._-]+@[a-zA-Z0-9]+"
               title="Enter valid UPI ID (e.g., username@bankhandle)"
               required>
        <small style="color: #666;">Enter your UPI ID to continue payment</small>
        <div id="upi_error" style="color: #dc3545; font-size: 12px; margin-top: 5px; display: none;"></div>
    </div>

    <!-- Payment method selection -->
    <div class="form-group" style="margin-bottom: 20px;">
        <label><i class="fas fa-credit-card"></i> Payment Method</label>
        <select id="payment_method" class="form-control">
            <option value="default">Select Payment Method</option>
            <option value="card">Credit/Debit Card</option>
            <option value="upi">UPI</option>
            <option value="netbanking">NetBanking</option>
        </select>
    </div>

    <!-- Razorpay Button -->
    <button id="rzp-button" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem;">
        <i class="fas fa-credit-card"></i> Pay Now ₹{{ total }}
    </button>

    <div style="margin-top: 20px; text-align: center;">
        <i class="fas fa-shield-alt" style="color: #28a745;"></i>
        <small style="color: #666;">Secured by Razorpay. Your payment info is encrypted.</small>
    </div>

    <div style="margin-top: 20px; display: flex; justify-content: center; gap: 20px;">
        <img src="https://razorpay.com/assets/razorpay-logo.svg" style="height: 30px;" alt="Razorpay">
        <span style="color: #666;">|</span>
        <span><i class="fab fa-cc-visa" style="font-size: 24px; color: #1a1f71;"></i></span>
        <span><i class="fab fa-cc-mastercard" style="font-size: 24px; color: #f79e1b;"></i></span>
        <span><i class="fab fa-cc-amex" style="font-size: 24px; color: #0070ba;"></i></span>
        <span><i class="fab fa-google-pay" style="font-size: 24px; color: #4285f4;"></i></span>
        <span><i class="fab fa-phonepe" style="font-size: 24px; color: #5f259f;"></i></span>
    </div>

    <div style="margin-top: 20px; text-align: center;">
        <a href="/my_orders" class="btn btn-secondary" style="padding: 8px 20px;">
            <i class="fas fa-times"></i> Cancel Payment
        </a>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    function validateUPIId(upiId) {
        if (!upiId) {
            document.getElementById('upi_error').style.display = 'block';
            document.getElementById('upi_error').innerHTML = 'UPI ID is required';
            return false;
        }
        
        // UPI ID format: username@bankhandle [citation:7]
        const upiRegex = /^[a-zA-Z0-9._-]+@[a-zA-Z0-9]+$/;
        if (!upiRegex.test(upiId)) {
            document.getElementById('upi_error').style.display = 'block';
            document.getElementById('upi_error').innerHTML = 'Invalid UPI ID format. Use format: username@bankhandle';
            return false;
        }
        
        // Check if UPI ID contains valid bank handles
        const validHandles = ['okhdfcbank', 'oksbi', 'okicici', 'okaxis', 'okpunjab', 
                            'okyesbank', 'okcanara', 'okbankofbaroda', 'ybl', 'paytm', 
                            'axl', 'ibl', 'pingpay', 'amazonpay', 'phonepe', 'gpay'];
        
        const handle = upiId.split('@')[1];
        if (!validHandles.some(h => handle.includes(h))) {
            document.getElementById('upi_error').style.display = 'block';
            document.getElementById('upi_error').innerHTML = 'Invalid UPI bank handle. Please check with your bank.';
            return false;
        }
        
        document.getElementById('upi_error').style.display = 'none';
        return true;
    }

    document.getElementById('rzp-button').onclick = function(e) {
        e.preventDefault();
        
        // Validate UPI ID
        const upiId = document.getElementById('upi_id').value;
        if (!validateUPIId(upiId)) {
            return;
        }
        
        // Get payment method
        const paymentMethod = document.getElementById('payment_method').value;
        if (paymentMethod === 'default') {
            alert('Please select a payment method');
            return;
        }
        
        // Prepare Razorpay options
        var options = {
            "key": "{{ razorpay_key_id }}",
            "amount": {{ total * 100 }},
            "currency": "INR",
            "name": "FoodieExpress",
            "description": "Order #{{ order_id }}",
            "image": "https://via.placeholder.com/150",
            "order_id": "{{ razorpay_order_id }}",
            "handler": function(response) {
                // Show loading indicator
                document.getElementById('rzp-button').innerHTML = 'Processing...';
                document.getElementById('rzp-button').disabled = true;
                
                // Send payment success to server
                fetch('/payment_success', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        'razorpay_payment_id': response.razorpay_payment_id,
                        'razorpay_order_id': response.razorpay_order_id,
                        'razorpay_signature': response.razorpay_signature
                    })
                })
                .then(() => {
                    window.location.href = '/my_orders';
                })
                .catch((error) => {
                    console.error('Error:', error);
                    window.location.href = '/my_orders';
                });
            },
            "modal": {
                "ondismiss": function() {
                    // User closed the payment modal without paying
                    fetch('/payment_failed', {
                        method: 'GET'
                    })
                    .then(() => {
                        window.location.href = '/my_orders';
                    });
                }
            },
            "prefill": {
                "name": "{{ session.username }}",
                "email": "{{ session.get('email', '') }}",
                "contact": "",
                "method": paymentMethod,
                "vpa": upiId // Pass UPI ID for prefill [citation:1]
            },
            "theme": {
                "color": "#667eea"
            }
        };
        
        // Open Razorpay checkout
        var rzp = new Razorpay(options);
        rzp.open();
    }

    // Real-time UPI ID validation
    document.getElementById('upi_id').addEventListener('input', function(e) {
        validateUPIId(e.target.value);
    });
</script>

<style>
    .card {
        transition: all 0.3s ease;
    }
    .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #333;
    }
    .form-control {
        width: 100%;
        padding: 10px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 14px;
        transition: all 0.3s ease;
    }
    .form-control:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    .form-control.error {
        border-color: #dc3545;
    }
    small {
        display: block;
        margin-top: 5px;
        color: #666;
        font-size: 12px;
    }
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
</style>

{% endblock %}
