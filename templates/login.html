{% extends 'base.html' %}
{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon">🍽️</div>
            <h2>Welcome Back!</h2>
            <p>Login to your account</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Username
                </label>
                <input type="text" id="username" name="username" 
                       placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" id="password" name="password" 
                       placeholder="Enter your password" required>
                <small>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </small>
            </div>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember me
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="/signup">Sign up here</a></p>
        </div>
        
        <div class="auth-divider">
            <span>or</span>
        </div>
        
        <div class="demo-credentials">
            <p><strong>Demo Credentials:</strong></p>
            <p>Admin: admin / admin123</p>
            <p>Viewer: (sign up new user)</p>
        </div>
    </div>
</div>

<style>
    .auth-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    
    .auth-card {
        background: white;
        border-radius: 30px;
        padding: 50px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .logo-icon {
        font-size: 60px;
        margin-bottom: 20px;
        animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    
    .auth-header h2 {
        margin: 0 0 10px 0;
        color: #333;
        font-size: 28px;
    }
    
    .auth-header p {
        margin: 0;
        color: #666;
        font-size: 16px;
    }
    
    .auth-form {
        margin-bottom: 30px;
    }
    
    .form-group {
        margin-bottom: 25px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
    }
    
    .form-group label i {
        color: #667eea;
        margin-right: 5px;
    }
    
    .form-group input[type="text"],
    .form-group input[type="password"] {
        width: 100%;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    
    .forgot-password {
        float: right;
        color: #667eea;
        text-decoration: none;
        font-size: 13px;
        transition: color 0.3s ease;
    }
    
    .forgot-password:hover {
        color: #764ba2;
        text-decoration: underline;
    }
    
    .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #666;
        font-weight: normal;
        cursor: pointer;
    }
    
    .checkbox-label input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
    }
    
    .btn-block {
        width: 100%;
        padding: 15px !important;
        font-size: 18px !important;
        margin-top: 10px;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 20px;
    }
    
    .auth-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }
    
    .auth-footer a:hover {
        color: #764ba2;
        text-decoration: underline;
    }
    
    .auth-divider {
        text-align: center;
        margin: 30px 0 20px;
        position: relative;
    }
    
    .auth-divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #e0e0e0;
        z-index: 1;
    }
    
    .auth-divider span {
        background: white;
        padding: 0 15px;
        color: #999;
        font-size: 14px;
        position: relative;
        z-index: 2;
    }
    
    .demo-credentials {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
    }
    
    .demo-credentials p {
        margin: 5px 0;
        color: #666;
        font-size: 13px;
    }
    
    .demo-credentials p:first-child {
        margin-bottom: 10px;
        color: #333;
    }
    
    @media (max-width: 768px) {
        .auth-card {
            padding: 30px;
        }
        
        .auth-header h2 {
            font-size: 24px;
        }
        
        .logo-icon {
            font-size: 50px;
        }
    }
</style>

{% endblock %}
