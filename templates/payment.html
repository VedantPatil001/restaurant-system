{% extends 'base.html' %}
{% block content %}

<div class="card" style="max-width: 500px; margin: 0 auto; padding: 30px;">
    <h2 class="text-center"><i class="fas fa-credit-card"></i> Payment</h2>
    
    <div class="text-center">
        <p><strong>Order ID:</strong> #{{ order_id }}</p>
        <p>Click the button below to complete your payment.</p>
        
        <div style="margin: 30px 0;">
            <a href="/payment_success/{{ order_id }}" class="btn btn-success" style="padding: 12px 30px;">
                <i class="fas fa-check"></i> Complete Payment
            </a>
            <a href="/my_orders" class="btn btn-secondary" style="padding: 12px 30px;">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
        
        <div style="background: #f8f9fa; padding: 15px; border-radius: 5px;">
            <p style="color: #666;">
                <strong>Note:</strong> After payment, your order will be pending admin approval.
                You'll be notified when admin approves your order.
            </p>
        </div>
    </div>
</div>

{% endblock %}
