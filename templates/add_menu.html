{% extends 'base.html' %}
{% block content %}

<div class="form-card">
    <h2><i class="fas fa-plus-circle"></i> Add New Menu Item</h2>
    
    <form method="POST">
        <label>Menu Name</label>
        <input type="text" name="mname" placeholder="Enter item name" required>

        <label>Price (₹)</label>
        <input type="number" name="price" step="0.01" placeholder="Enter price" required>

        <label>Category</label>
        <select name="fid" required>
            <option value="">-- Select Category --</option>
            {% for c in categories %}
            <option value="{{ c[0] }}">{{ c[1] }}</option>
            {% endfor %}
        </select>

        <label>Size</label>
        <select name="qid" required>
            <option value="">-- Select Size --</option>
            {% for q in quantities %}
            <option value="{{ q[0] }}">{{ q[1] }}</option>
            {% endfor %}
        </select>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn-success" style="flex: 1;">
                <i class="fas fa-save"></i> Add Menu
            </button>
            <a href="/menu" class="btn-secondary" style="flex: 1; text-align: center; padding: 8px;">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
